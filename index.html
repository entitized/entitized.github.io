    <style>
    html{
        margin:0px;
        padding:0px;
    }

    body{
        background: #000;
        color: #FFF;
        margin:0px;
        padding:0px;
        font-family: monospace;
        font-size:4mm;
    }
    .main{
        position: absolute;
        margin: auto;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        width: 20vw;
        height: 20vh;
        text-align: center;
    }
    /*A responsive mess*/
    @media only screen and (max-width: 600px) {
        .main{
            position: auto;
            margin: auto;
            top: auto;
            right: auto;
            bottom: auto;
            left: auto;
            width: auto;
            height: auto;
        }
        pre {padding-left:2vw;}
    }
    a:link{
        color: #a5a5a5;
    }
    a:visited{
        color: #696969;
    }
    </style>
    <body onload="message()">
        <div class="main">
            <div id="term">
                <pre id="message"></pre>
            </div>
        </div>
        <script>
            var i = 0;
            function message(){
                var out=document.getElementById("message");
                var msg =  "Hello! you can find me here.\n\t\t       ├github.\n\t\t       ├twitter.\n\t\t       ├twitch.\n\t\t       └instagram. \n\n\n   more is to come!";
            
                    if (i <= msg.length) {
                        out.innerHTML+=msg.charAt(i);
                        i++;
                        setTimeout(message, 70);
                    }else{
					var str = document.getElementById("message").innerHTML; 
        			var res = str.replace("twitter", "<a href=\"https://twitter.com/paulstechnology\">twitter</a>");
					var res = res.replace("twitch", "<a href=\"https://twitch.tv/pauls_tech\">twitch</a>");
        			var res = res.replace("github", "<a href=\"https://github.com/pauls-tech\">github</a>");
        			var res = res.replace("instagram", "<a href=\"https://www.instagram.com/pauls.technology\">instagram</a>");
        			document.getElementById("message").innerHTML = res;

                }
            }

        </script>
    </body>
