<html>
    <head>
        <title>entitized.xyz</title>
        <meta name="title" content="entitized.xyz">
        <meta name="description" content="yes">

        <meta name="viewport" content="width=device-width, initial-scale=1">

        <meta property="og:type" content="entitized.xyz">
        <meta property="og:url" content="http://entitized.xyz/">
        <meta property="og:title" content="entitized.xyz">
        <meta property="og:description" content="yes">
        <meta property="og:image" content="/images/cubecrux.png">

        <meta property="twitter:card" content="yes">
        <meta property="twitter:url" content="entitized.xyz">
        <meta property="twitter:title" content="entitized.xyz">
        <meta property="twitter:description" content="yes">
       <meta property="twitter:image" content="/images/cubecrux.png">
    </head>
    <style>
    html{
        margin:0px;
        padding:0px;
    }

    body{
        background: #000;
        color: #FFF;
        margin:0px;
        padding:0px;
        font-family: monospace;
        font-size: 4mm;
    }
    .main{
        position: absolute;
        margin: auto;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        width: 20vw;
        height: 20vh;
        text-align: left;
    }
    /*A responsive mess*/
    @media only screen and (max-width: 600px) {
        .main{
            position: auto;
            margin: auto;
            top: auto;
            right: auto;
            bottom: auto;
            left: auto;
            width: auto;
            height: auto;
        }
        pre {padding-left:2vw;}
    }
    a:link{
        color: #a5a5a5;
    }
    a:visited{
        color: #696969;
    }
    </style>
    <body onload="message()">
        <div class="main">
        <img src="images/cubecrux.png" width="50" height="50">
            <div id="term">
                <pre id="message"></pre>
            </div>
        </div>
        <script> 
            var i = 0;
            function message(){
                var out=document.getElementById("message");
                var msg = "Hello! You can find me here:\n\n- github.\n- twitter.\n- twitch.\n- instagram.\n\n\nMore is to come!";
            
                    if (i <= msg.length) {
                        out.innerHTML+=msg.charAt(i);
                        i++;
                        setTimeout(message, 40);
                    }else{
					var str = document.getElementById("message").innerHTML; 
        			var res = str.replace("twitter", "<a href=\"https://twitter.com/entitized\">twitter</a>");
					var res = res.replace("twitch", "<a href=\"https://twitch.tv/entitized\">twitch</a>");
        			var res = res.replace("github", "<a href=\"https://github.com/entitized\">github</a>");
        			var res = res.replace("instagram", "<a href=\"https://www.instagram.com/entitized\">instagram</a>");
        			document.getElementById("message").innerHTML = res;

                }
            }

        </script>
    </body>
</html>
